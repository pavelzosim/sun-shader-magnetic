<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UE 5.7 Magnetic Fibrils | Fixed</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            width: 300px; background: rgba(10, 10, 10, 0.95);
            padding: 0; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 100; border: 1px solid #444;
            backdrop-filter: blur(10px);
        }
        .ui-header { padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .ui-header h2 { margin: 0; font-size: 13px; color: #ffaa00; text-transform: uppercase; letter-spacing: 1.5px; }
        .ui-content { padding: 20px; }
        .control-group { margin-bottom: 18px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 10px; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        .control-group label span.value { color: #ffaa00; font-family: monospace; font-size: 12px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ffaa00; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div class="ui-header"><h2>Sun Magnetic USH</h2></div>
        <div class="ui-content">
            <div class="control-group">
                <label>Umbra Size <span id="val-umbraThresh" class="value">0.62</span></label>
                <input type="range" id="umbraThresh" min="0.4" max="0.8" step="0.01" value="0.62">
            </div>
            <div class="control-group">
                <label>Penumbra Size <span id="val-penumbraThresh" class="value">0.40</span></label>
                <input type="range" id="penumbraThresh" min="0.1" max="0.6" step="0.01" value="0.40">
            </div>
            <div class="control-group">
                <label>Vortex Strength <span id="val-vortex" class="value">1.50</span></label>
                <input type="range" id="vortex" min="0.0" max="5.0" step="0.1" value="1.50">
            </div>
            <div class="control-group">
                <label>Fibril Density <span id="val-density" class="value">60.0</span></label>
                <input type="range" id="density" min="10.0" max="120.0" step="1.0" value="60.0">
            </div>
            <div class="control-group">
                <label>Waviness <span id="val-waviness" class="value">0.05</span></label>
                <input type="range" id="waviness" min="0.0" max="0.2" step="0.01" value="0.05">
            </div>
        </div>
    </div>

    <!-- Обновили ссылку на актуальную версию Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, material;
        const startTime = Date.now();

        const _VS = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const _FS = `
            precision highp float;
            uniform float time;
            uniform float umbraThresh;
            uniform float penumbraThresh;
            uniform float vortex;
            uniform float density;
            uniform float waviness;
            varying vec2 vUv;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }

            void main() {
                vec2 uv = (vUv - 0.5) * 2.0;
                float r = length(uv);
                float Bz = smoothstep(1.0, 0.0, r);
                
                // ИСПРАВЛЕНИЕ: + 0.0001 спасает от ошибки NaN на некоторых видеокартах
                float baseAngle = atan(uv.y, uv.x + 0.0001);
                
                float angle = baseAngle + vortex * (Bz * Bz);

                float bestStrandHeight = 0.0;
                float bestFibers = 0.0;
                float bestShading = 0.0;
                float safeTime = mod(time, 3600.0);

                for (int i = 0; i < 3; i++) {
                    float lf = float(i);
                    float lAngleID = floor((angle + lf * 0.31) * (density / 6.2831));
                    
                    float lr1 = hash(vec2(lAngleID, lf * 17.13));
                    float lr2 = hash(vec2(lAngleID, lf * 43.71));
                    
                    float wave = sin(Bz * 20.0 + safeTime * 2.0 + lr1 * 6.28) * waviness;
                    float lPhase = lr1 * 6.28 + safeTime * ((lr2 * 2.0 - 1.0) * 0.4);
                    
                    float lRaw = cos((angle + wave) * density + lPhase);
                    float lCylinder = sqrt(max(0.0, 1.0 - lRaw * lRaw));
                    
                    float lStrandHeight = lCylinder * (1.0 - lf * 0.25);

                    if (lStrandHeight > bestStrandHeight) {
                        bestStrandHeight = lStrandHeight;
                        bestFibers = pow(lCylinder, 3.5); 
                        bestShading = mix(0.4, 1.0, pow(lCylinder, 0.5)); 
                    }
                }

                float penInner = min(penumbraThresh + 0.22, umbraThresh);
                float penW = smoothstep(penumbraThresh * 0.85, penInner, Bz);
                float umbra = smoothstep(umbraThresh, umbraThresh + 0.05, Bz);
                float penumbraZone = clamp(penW * (1.0 - umbra), 0.0, 1.0);

                vec3 photoColor = vec3(1.0, 0.6, 0.15); 
                vec3 penColor = vec3(0.45, 0.18, 0.04);
                vec3 umbColor = vec3(0.01, 0.006, 0.003);

                vec3 finalColor = mix(photoColor, penColor, penW);
                finalColor = mix(finalColor, finalColor * bestShading, penumbraZone * 0.85);
                finalColor += bestFibers * (1.0 - penW) * penumbraZone * 0.4;
                finalColor = mix(finalColor, umbColor, umbra);

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    umbraThresh: { value: 0.62 },
                    penumbraThresh: { value: 0.40 },
                    vortex: { value: 1.5 },
                    density: { value: 60.0 },
                    waviness: { value: 0.05 }
                },
                vertexShader: _VS, fragmentShader: _FS
            });

            // ИСПРАВЛЕНИЕ: PlaneGeometry вместо устаревшего PlaneBufferGeometry
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);
            
            setupUI();
            animate();
        }

        function setupUI() {
            const params = ['umbraThresh', 'penumbraThresh', 'vortex', 'density', 'waviness'];
            params.forEach(id => {
                const el = document.getElementById(id);
                // ИСПРАВЛЕНИЕ: Защита от краша, если ты удалил ползунок из HTML
                if (el) {
                    el.addEventListener('input', (e) => {
                        let val = parseFloat(e.target.value);
                        document.getElementById('val-'+id).innerText = val.toFixed(2);
                        material.uniforms[id].value = val;
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.time.value = (Date.now() - startTime) * 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Magnetic Activity (HLSL -> WebGL)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #080808; color: #eee; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-panel {
            position: absolute; top: 20px; right: 20px;
            width: 320px; background: rgba(15, 15, 15, 0.95);
            padding: 20px; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            z-index: 10; border: 1px solid #333;
            backdrop-filter: blur(10px);
        }
        h2 { margin: 0 0 10px 0; font-size: 20px; color: #ff8800; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 12px; color: #999; margin-bottom: 20px; line-height: 1.4; }
        
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; color: #bbb; margin-bottom: 5px; }
        .control-group label span { color: #ff8800; font-family: monospace; font-size: 13px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff8800; }
        
        .info-box { background: rgba(255, 136, 0, 0.1); border-left: 3px solid #ff8800; padding: 10px; font-size: 11px; color: #ddd; margin-top: 10px; }
        .footer { margin-top: 15px; font-size: 10px; color: #555; text-align: center; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>Magnetic Activity</h2>
        <p>Simulating B-field gradients, sunspot penumbra fibrils, and faculae formation.</p>
        
        <div class="control-group">
            <label>Umbra Threshold <span id="val-umbraThresh">0.62</span></label>
            <input type="range" id="umbraThresh" min="0.4" max="0.9" step="0.01" value="0.62">
        </div>
        
        <div class="control-group">
            <label>Penumbra Threshold <span id="val-penumbraThresh">0.42</span></label>
            <input type="range" id="penumbraThresh" min="0.1" max="0.6" step="0.01" value="0.42">
        </div>

        <div class="control-group">
            <label>Umbra Brightness <span id="val-umbraB">0.32</span></label>
            <input type="range" id="umbraB" min="0.0" max="0.6" step="0.01" value="0.32">
        </div>

        <div class="control-group">
            <label>Fibril Intensity <span id="val-fibrilIntensity">0.06</span></label>
            <input type="range" id="fibrilIntensity" min="0.0" max="0.15" step="0.01" value="0.06">
        </div>

        <div class="info-box">
            Fibrils are generated by calculating the gradient of the B-field and warping noise radially.
        </div>

        <div class="footer">UE 5.7 Procedural Workflow Demo • STEP 4</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, mesh, material;
        const startTime = Date.now();

        const _VS = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const _FS = `
            precision highp float;
            uniform float time;
            uniform float umbraThresh;
            uniform float penumbraThresh;
            uniform float umbraB;
            uniform float penumbraB;
            uniform float fibrilIntensity;
            varying vec2 vUv;

            // --- NOISE UTILITIES ---
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 fade(vec3 t) { return t*t*t*(t*(t*6.0-15.0)+10.0); }

            float pnoise(vec3 P) {
                vec3 Pi0 = floor(P); vec3 Pi1 = Pi0 + vec3(1.0);
                Pi0 = mod289(Pi0); Pi1 = mod289(Pi1);
                vec3 Pf0 = fract(P); vec3 Pf1 = Pf0 - vec3(1.0);
                vec4 ix = vec4(Pi0.x, Pi1.x, Pi0.x, Pi1.x);
                vec4 iy = vec4(Pi0.yy, Pi1.yy);
                vec4 iz0 = Pi0.zzzz; vec4 iz1 = Pi1.zzzz;
                // Simplified noise for performance
                return fract(sin(dot(Pi0 ,vec3(12.9898,78.233,45.5432))) * 43758.5453) * 2.0 - 1.0;
            }

            // Simple 3D Hash
            float hash(vec3 p) {
                p = fract(p * vec3(443.897, 441.423, 437.195));
                p += dot(p, p.yzx + 19.19);
                return fract((p.x + p.y) * p.z);
            }

            // Value Noise 3D
            float vnoise(vec3 p) {
                vec3 i = floor(p); vec3 f = fract(p);
                f = f*f*(3.0-2.0*f);
                return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                               mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                           mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                               mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
            }

            float fbm(vec3 p) {
                float v = 0.0; float a = 0.5;
                for (int i = 0; i < 4; i++) {
                    v += a * vnoise(p); p *= 2.1; a *= 0.5;
                }
                return v;
            }

            // --- SUN MAGNETIC LOGIC ---

            // Bz Field Generation
            float getBz(vec3 p) {
                float rotation = time * 0.15;
                float s = sin(rotation), c = cos(rotation);
                vec3 rotP = vec3(p.x * c - p.z * s, p.y, p.x * s + p.z * c);
                float n = fbm(rotP * 3.5);
                // SmoothRemap(n, 0.6, 1.0)
                return smoothstep(0.55, 0.9, n);
            }

            void main() {
                vec2 uv = (vUv - 0.5) * 2.0;
                // Project 2D UV to 3D Sphere surface
                float z = sqrt(1.0 - dot(uv, uv));
                vec3 P = vec3(uv, z);

                if (dot(uv, uv) > 1.0) { discard; } // Crop to circle

                float Bz = getBz(P);

                // Calculate Gradient for Fibrils (Central Differences)
                float delta = 0.02;
                float dBx = getBz(P + vec3(delta, 0, 0)) - getBz(P - vec3(delta, 0, 0));
                float dBy = getBz(P + vec3(0, delta, 0)) - getBz(P - vec3(0, delta, 0));
                float dBz = getBz(P + vec3(0, 0, delta)) - getBz(P - vec3(0, 0, delta));
                vec3 grad = normalize(vec3(dBx, dBy, dBz) + 0.0001);

                // Penumbra Fibril Warp
                float penumbraMask = smoothstep(penumbraThresh, umbraThresh, Bz);
                vec3 warpedP = P + grad * penumbraMask * fibrilIntensity;
                float fibril = vnoise(warpedP * 35.0 + time * 0.1);

                // Zones
                float umbraMask = smoothstep(umbraThresh, 1.0, Bz);
                
                // Color Assembly
                vec3 baseColor = vec3(1.0, 0.5, 0.05); // Orange
                vec3 penColor = vec3(0.4, 0.15, 0.05) * (0.8 + fibril * 0.4);
                vec3 umbColor = vec3(0.05, 0.02, 0.01) * umbraB * 10.0;

                // Faculae (Bright edges around spots)
                float faculae = smoothstep(0.1, 0.4, Bz) * (1.0 - smoothstep(0.4, 0.7, Bz));
                vec3 facColor = vec3(1.0, 0.9, 0.6) * faculae * 0.4;

                vec3 finalColor = mix(baseColor, penColor, penumbraMask);
                finalColor = mix(finalColor, umbColor, umbraMask);
                finalColor += facColor;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    umbraThresh: { value: 0.62 },
                    penumbraThresh: { value: 0.42 },
                    umbraB: { value: 0.32 },
                    penumbraB: { value: 0.68 },
                    fibrilIntensity: { value: 0.06 }
                },
                vertexShader: _VS,
                fragmentShader: _FS
            });

            mesh = new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), material);
            scene.add(mesh);

            setupUI();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.time.value = (Date.now() - startTime) * 0.001;
            renderer.render(scene, camera);
        }

        function setupUI() {
            ['umbraThresh', 'penumbraThresh', 'umbraB', 'fibrilIntensity'].forEach(id => {
                const el = document.getElementById(id);
                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    document.getElementById('val-' + id).innerText = val.toFixed(2);
                    material.uniforms[id].value = val;
                });
            });
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sun Magnetic Spot - Default Settings</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            width: 300px; background: rgba(18, 18, 16, 0.98);
            padding: 0; border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 100; border: 1px solid #2a2a24;
        }
        .ui-header { padding: 15px 20px; border-bottom: 1px solid #2a2a24; }
        .ui-header h2 { margin: 0; font-size: 14px; color: #ffaa00; text-transform: uppercase; letter-spacing: 1px; }
        .ui-content { padding: 20px; }
        .control-group { margin-bottom: 25px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .control-group label span.value { color: #ffaa00; font-family: monospace; font-size: 13px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ffaa00; background: #333; height: 4px; border-radius: 2px; appearance: none; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #999; border: 2px solid #fff; border-radius: 50%; }
        .footer { padding: 12px; font-size: 10px; color: #444; text-align: center; border-top: 1px solid #222; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div class="ui-header"><h2>SUN MAGNETIC USH</h2></div>
        <div class="ui-content">
            <div class="control-group">
                <label>UMBRA SIZE <span id="val-umbraThresh" class="value">0.62</span></label>
                <input type="range" id="umbraThresh" min="0.4" max="0.9" step="0.01" value="0.62">
            </div>
            <div class="control-group">
                <label>PENUMBRA SIZE <span id="val-penumbraThresh" class="value">0.28</span></label>
                <input type="range" id="penumbraThresh" min="0.1" max="0.6" step="0.01" value="0.28">
            </div>
            <div class="control-group">
                <label>VORTEX STRENGTH <span id="val-vortex" class="value">0.00</span></label>
                <input type="range" id="vortex" min="0.0" max="5.0" step="0.1" value="0.00">
            </div>
            <div class="control-group">
                <label>FIBRIL DENSITY <span id="val-density" class="value">24.00</span></label>
                <input type="range" id="density" min="10.0" max="120.0" step="1.0" value="24.00">
            </div>
            <div class="control-group">
                <label>WAVINESS <span id="val-waviness" class="value">0.04</span></label>
                <input type="range" id="waviness" min="0.0" max="0.3" step="0.01" value="0.04">
            </div>
        </div>
        <div class="footer"> • by pavelzosim.com • Based on SunMagnetic.ush [UE 5.7]</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, material;
        const startTime = Date.now();

        const _VS = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const _FS = `
            precision highp float;
            uniform float time;
            uniform float umbraThresh;
            uniform float penumbraThresh;
            uniform float vortex;
            uniform float density;
            uniform float waviness;
            varying vec2 vUv;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }

            void main() {
                vec2 uv = (vUv - 0.5) * 2.0;
                float r = length(uv);
                
                // Магнитное поле Bz[cite: 1]
                float Bz = smoothstep(1.0, 0.0, r);
                
                // Радиальный угол с защитой от NaN[cite: 1]
                float baseAngle = atan(uv.y, uv.x + 0.00001);
                
                // Закручивание вихря[cite: 1]
                float angle = baseAngle + vortex * (Bz * Bz);

                float bestStrandHeight = 0.0;
                float bestFibers = 0.0;
                float bestShading = 0.0;
                float safeTime = mod(time, 3600.0);

                // Цикл многослойных нитей (Z-Buffer logic)[cite: 1]
                for (int i = 0; i < 3; i++) {
                    float lf = float(i);
                    float lAngleID = floor((angle + lf * 0.31) * (density / 6.2831));
                    
                    float lr1 = hash(vec2(lAngleID, lf * 17.13));
                    float lr2 = hash(vec2(lAngleID, lf * 43.71));
                    
                    // Волнистость и фаза движения[cite: 1]
                    float wave = sin(Bz * 25.0 + safeTime * 1.5 + lr1 * 6.28) * waviness;
                    float lPhase = lr1 * 6.28 + safeTime * ((lr2 * 2.0 - 1.0) * 0.3);
                    
                    // Цилиндрический профиль волокна[cite: 1]
                    float lRaw = cos((angle + wave) * density + lPhase);
                    float lCylinder = sqrt(max(0.0, 1.0 - lRaw * lRaw));
                    
                    float lStrandHeight = lCylinder * (1.0 - lf * 0.25);

                    if (lStrandHeight > bestStrandHeight) {
                        bestStrandHeight = lStrandHeight;
                        bestFibers = pow(lCylinder, 4.0); 
                        bestShading = mix(0.35, 1.0, pow(lCylinder, 0.5)); 
                    }
                }

                // Маски зон[cite: 1]
                float penInner = min(penumbraThresh + 0.25, umbraThresh);
                float penW = smoothstep(penumbraThresh * 0.8, penInner, Bz);
                float umbra = smoothstep(umbraThresh, umbraThresh + 0.03, Bz);
                float penZone = clamp(penW * (1.0 - umbra), 0.0, 1.0);

                // Цветовая палитра
                vec3 photoColor = vec3(1.0, 0.58, 0.12); 
                vec3 penColor = vec3(0.42, 0.16, 0.03);
                vec3 umbColor = vec3(0.008, 0.004, 0.002);

                // Сборка финального пикселя[cite: 1]
                vec3 finalColor = mix(photoColor, penColor, penW);
                finalColor = mix(finalColor, finalColor * bestShading, penZone * 0.9);
                finalColor += bestFibers * (1.0 - penW) * penZone * 0.45;
                finalColor = mix(finalColor, umbColor, umbra);

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    umbraThresh: { value: 0.62 }, // Дефолт из image_57fd86.png[cite: 1]
                    penumbraThresh: { value: 0.28 }, // Дефолт из image_57fd86.png[cite: 1]
                    vortex: { value: 0.0 }, // Дефолт из image_57fd86.png[cite: 1]
                    density: { value: 24.0 }, // Дефолт из image_57fd86.png[cite: 1]
                    waviness: { value: 0.04 } // Дефолт из image_57fd86.png[cite: 1]
                },
                vertexShader: _VS, fragmentShader: _FS
            });

            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);
            
            setupUI();
            animate();
        }

        function setupUI() {
            const params = ['umbraThresh', 'penumbraThresh', 'vortex', 'density', 'waviness'];
            params.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('input', (e) => {
                        let val = parseFloat(e.target.value);
                        document.getElementById('val-'+id).innerText = val.toFixed(2);
                        material.uniforms[id].value = val;
                    });
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.time.value = (Date.now() - startTime) * 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>

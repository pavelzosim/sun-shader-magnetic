<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Pattern | UE 5.7 Procedural Demo</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #080808; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            width: 280px; background: rgba(10, 10, 10, 0.9);
            padding: 0; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 100; border: 1px solid #333;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #ui-panel.minimized { transform: translateX(-300px); opacity: 0; pointer-events: none; }
        
        .ui-header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .ui-header h2 { margin: 0; font-size: 14px; color: #ff8800; text-transform: uppercase; letter-spacing: 1px; }
        
        #ui-toggle-btn {
            position: absolute; top: 20px; left: 20px;
            width: 40px; height: 40px; background: #ff8800;
            border: none; border-radius: 8px; cursor: pointer;
            z-index: 101; display: none; align-items: center; justify-content: center;
        }
        #ui-toggle-btn.visible { display: flex; }
        .close-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; }

        .ui-content { padding: 20px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .control-group label span.value { color: #ff8800; font-family: monospace; font-size: 13px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff8800; }
        .footer { padding: 10px 20px; font-size: 10px; color: #444; text-align: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <button id="ui-toggle-btn" onclick="toggleUI()">⚙️</button>

    <div id="ui-panel">
        <div class="ui-header">
            <h2>Magnetic Pattern</h2>
            <button class="close-btn" onclick="toggleUI()">×</button>
        </div>
        <div class="ui-content">
            <div class="control-group">
                <label>Umbra Size <span id="val-umbraThresh" class="value">0.50</span></label>
                <input type="range" id="umbraThresh" min="0.2" max="0.8" step="0.01" value="0.50">
            </div>
            <div class="control-group">
                <label>Penumbra Size <span id="val-penumbraThresh" class="value">0.30</span></label>
                <input type="range" id="penumbraThresh" min="0.1" max="0.6" step="0.01" value="0.30">
            </div>
            <div class="control-group">
                <label>Fibril Stretch <span id="val-fibrilIntensity" class="value">0.08</span></label>
                <input type="range" id="fibrilIntensity" min="0.0" max="0.2" step="0.01" value="0.08">
            </div>
        </div>
        <div class="footer">UE 5.7 Procedural Demo • STEP 4</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, mesh, material;
        const startTime = Date.now();

        function toggleUI() {
            document.getElementById('ui-panel').classList.toggle('minimized');
            document.getElementById('ui-toggle-btn').classList.toggle('visible');
        }

        const _VS = `
            varying vec2 vUv;
            void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
        `;

        const _FS = `
            precision highp float;
            uniform float time;
            uniform float umbraThresh;
            uniform float penumbraThresh;
            uniform float fibrilIntensity;
            varying vec2 vUv;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }

            float vnoise(vec2 p) {
                vec2 i = floor(p); vec2 f = fract(p);
                f = f*f*(3.0-2.0*f);
                return mix(mix(hash(i), hash(i+vec2(1,0)), f.x),
                           mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
            }

            // --- MAGNETIC SPOT LOGIC ---
            void main() {
                vec2 uv = (vUv - 0.5) * 2.0;
                float r = length(uv);

                // 1. Bz Field (Radial drop-off for a single spot)
                float Bz = smoothstep(1.0, 0.0, r);

                // 2. Fibril Warp (Gradient calculation in 2D)
                // The gradient of a radial field points towards the center
                vec2 grad = normalize(uv + 0.0001); 
                
                float penumbraMask = smoothstep(penumbraThresh, umbraThresh, Bz);
                
                // Warp the noise coordinates radially to create fibrils
                vec2 warpedUV = vUv + grad * penumbraMask * fibrilIntensity;
                float fibril = vnoise(warpedUV * 60.0 + time * 0.1);

                // 3. Coloring
                float umbraMask = smoothstep(umbraThresh, umbraThresh + 0.1, Bz);
                
                vec3 baseColor = vec3(1.0, 0.55, 0.1); 
                vec3 penColor = vec3(0.4, 0.18, 0.05) * (0.8 + fibril * 0.5);
                vec3 umbColor = vec3(0.02, 0.01, 0.005);

                vec3 finalColor = mix(baseColor, penColor, penumbraMask);
                finalColor = mix(finalColor, umbColor, umbraMask);

                // Add Faculae (Bright ring)
                float faculae = smoothstep(0.1, 0.3, Bz) * (1.0 - smoothstep(0.3, 0.5, Bz));
                finalColor += vec3(1.0, 0.8, 0.4) * faculae * 0.3;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    umbraThresh: { value: 0.5 },
                    penumbraThresh: { value: 0.3 },
                    fibrilIntensity: { value: 0.08 }
                },
                vertexShader: _VS, fragmentShader: _FS
            });

            mesh = new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), material);
            scene.add(mesh);
            setupUI();
            animate();
        }

        function setupUI() {
            ['umbraThresh', 'penumbraThresh', 'fibrilIntensity'].forEach(id => {
                document.getElementById(id).addEventListener('input', (e) => {
                    let val = parseFloat(e.target.value);
                    document.getElementById('val-'+id).innerText = val.toFixed(2);
                    material.uniforms[id].value = val;
                });
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.time.value = (Date.now() - startTime) * 0.001;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>

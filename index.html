<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Activity | UE 5.7 Procedural Demo</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #080808; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Floating & Collapsible UI */
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            width: 280px; background: rgba(10, 10, 10, 0.9);
            padding: 0; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 100; border: 1px solid #333;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        #ui-panel.minimized { transform: translateX(-300px); opacity: 0; pointer-events: none; }
        
        .ui-header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .ui-header h2 { margin: 0; font-size: 14px; color: #ff8800; text-transform: uppercase; letter-spacing: 1px; }
        
        #ui-toggle-btn {
            position: absolute; top: 20px; left: 20px;
            width: 40px; height: 40px; background: #ff8800;
            border: none; border-radius: 8px; cursor: pointer;
            z-index: 101; display: none; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(255,136,0,0.3);
        }
        #ui-toggle-btn.visible { display: flex; }

        .close-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; }
        .close-btn:hover { color: #fff; }

        .ui-content { padding: 20px; }
        
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .control-group label span.value { color: #ff8800; font-family: monospace; font-size: 13px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ff8800; margin: 0; }

        .footer { padding: 10px 20px; font-size: 10px; color: #444; text-align: center; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <button id="ui-toggle-btn" onclick="toggleUI()">⚙️</button>

    <div id="ui-panel">
        <div class="ui-header">
            <h2>Magnetic Settings</h2>
            <button class="close-btn" onclick="toggleUI()">×</button>
        </div>
        <div class="ui-content">
            
            <div class="control-group">
                <label>Umbra Thresh <span id="val-umbraThresh" class="value">0.62</span></label>
                <input type="range" id="umbraThresh" min="0.4" max="0.9" step="0.01" value="0.62">
            </div>
            
            <div class="control-group">
                <label>Penumbra Thresh <span id="val-penumbraThresh" class="value">0.42</span></label>
                <input type="range" id="penumbraThresh" min="0.1" max="0.6" step="0.01" value="0.42">
            </div>

            <div class="control-group">
                <label>Umbra Bright <span id="val-umbraB" class="value">0.32</span></label>
                <input type="range" id="umbraB" min="0.0" max="0.6" step="0.01" value="0.32">
            </div>

            <div class="control-group">
                <label>Fibril Intensity <span id="val-fibrilIntensity" class="value">0.06</span></label>
                <input type="range" id="fibrilIntensity" min="0.0" max="0.15" step="0.01" value="0.06">
            </div>

        </div>
        <div class="footer">UE 5.7 Procedural Demo • STEP 4</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- GLOBAL VARIABLES ---
        let scene, camera, renderer, mesh, material;
        const startTime = Date.now();

        // UI Toggle Logic
        function toggleUI() {
            const panel = document.getElementById('ui-panel');
            const btn = document.getElementById('ui-toggle-btn');
            panel.classList.toggle('minimized');
            btn.classList.toggle('visible');
        }

        // --- SHADERS (GLSL) ---
        const _VS = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const _FS = `
            precision highp float;
            uniform float time;
            uniform float umbraThresh;
            uniform float penumbraThresh;
            uniform float umbraB;
            uniform float fibrilIntensity;
            varying vec2 vUv;

            // Simple 3D Hash
            float hash(vec3 p) {
                p = fract(p * vec3(443.897, 441.423, 437.195));
                p += dot(p, p.yzx + 19.19);
                return fract((p.x + p.y) * p.z);
            }

            // Value Noise 3D
            float vnoise(vec3 p) {
                vec3 i = floor(p); vec3 f = fract(p);
                f = f*f*(3.0-2.0*f);
                return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                               mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                           mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                               mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
            }

            // Fractal Brownian Motion
            float fbm(vec3 p) {
                float v = 0.0; float a = 0.5;
                for (int i = 0; i < 4; i++) {
                    v += a * vnoise(p); p *= 2.1; a *= 0.5;
                }
                return v;
            }

            // --- SUN MAGNETIC LOGIC ---

            // Bz Field Generation (procedural плейсхолдер Niagara RT)
            float getBz(vec3 p) {
                float rotation = time * 0.15;
                // Rotate around Y to simulate surface rotation
                float s = sin(rotation), c = cos(rotation);
                vec3 rotP = vec3(p.x * c - p.z * s, p.y, p.x * s + p.z * c);
                float n = fbm(rotP * 3.5);
                // smoothstep maps noise level [0.6, 1.0] to B-field [0.0, 1.0]
                return smoothstep(0.55, 0.9, n);
            }

            void main() {
                // Adjust UV to project 2D to 3D Sphere surface
                vec2 uv = (vUv - 0.5) * 2.0;
                float z = sqrt(1.0 - dot(uv, uv));
                vec3 P = vec3(uv, z);

                // Crop to circle
                if (dot(uv, uv) > 1.0) { discard; }

                // STEP 1: Get B-field strength Bz
                float Bz = getBz(P);

                // STEP 2: Calculate Gradient for Penumbra Warp (Central Differences)
                // Grad vector points towards spot centers
                float delta = 0.02;
                float dBx = getBz(P + vec3(delta, 0, 0)) - getBz(P - vec3(delta, 0, 0));
                float dBy = getBz(P + vec3(0, delta, 0)) - getBz(P - vec3(0, delta, 0));
                float dBz = getBz(P + vec3(0, 0, delta)) - getBz(P - vec3(0, 0, delta));
                vec3 grad = normalize(vec3(dBx, dBy, dBz) + 0.0001);

                // STEP 3: Generate radial fibril noise
                float penumbraMask = smoothstep(penumbraThresh, umbraThresh, Bz);
                // Warp position along B-field gradient -> creates radial stretch
                vec3 warpedP = P + grad * penumbraMask * fibrilIntensity;
                float fibril = vnoise(warpedP * 35.0 + time * 0.1);

                // STEP 4: Color Assembly
                float umbraMask = smoothstep(umbraThresh, 1.0, Bz);
                
                vec3 baseColor = vec3(1.0, 0.5, 0.05); // Orange/Yellow photo
                // Penumbra (brownish with fibrils)
                vec3 penColor = vec3(0.4, 0.15, 0.05) * (0.8 + fibril * 0.4);
                // Umbra (almost black, scaled by uniform)
                vec3 umbColor = vec3(0.05, 0.02, 0.01) * umbraB * 10.0;

                // Faculae (Bright edges around spots where Bz is moderate)
                float faculae = smoothstep(0.1, 0.4, Bz) * (1.0 - smoothstep(0.4, 0.7, Bz));
                vec3 facColor = vec3(1.0, 0.9, 0.6) * faculae * 0.4;

                vec3 finalColor = mix(baseColor, penColor, penumbraMask);
                finalColor = mix(finalColor, umbColor, umbraMask);
                finalColor += facColor;

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // --- APP INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera(); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.PlaneBufferGeometry(2, 2);
            
            material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    umbraThresh: { value: 0.62 },
                    penumbraThresh: { value: 0.42 },
                    umbraB: { value: 0.32 },
                    penumbraB: { value: 0.68 },
                    fibrilIntensity: { value: 0.06 }
                },
                vertexShader: _VS,
                fragmentShader: _FS
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            window.addEventListener('resize', onWindowResize, false);
            setupUI();
            animate();
        }

        function onWindowResize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.time.value = (Date.now() - startTime) * 0.001;
            renderer.render(scene, camera);
        }

        function setupUI() {
            const params = ['umbraThresh', 'penumbraThresh', 'umbraB', 'fibrilIntensity'];
            params.forEach(id => {
                const el = document.getElementById(id);
                const display = document.getElementById('val-' + id);
                el.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    display.innerText = val.toFixed(2);
                    material.uniforms[id].value = val;
                });
            });
        }

        init();
    </script>
</body>
</html>
